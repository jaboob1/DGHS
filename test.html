<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الموظفين</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

:root {
–bg: #0d1117;
–surface: #161b22;
–surface2: #21262d;
–border: #30363d;
–accent: #f0a500;
–accent2: #e8720c;
–text: #e6edf3;
–text-muted: #8b949e;
–green: #3fb950;
–red: #f85149;
–blue: #58a6ff;
–radius: 10px;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘IBM Plex Sans Arabic’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
}

/* ─── Header ─── */
header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 0 32px;
display: flex;
align-items: center;
justify-content: space-between;
height: 64px;
position: sticky;
top: 0;
z-index: 100;
}

.logo {
display: flex;
align-items: center;
gap: 12px;
font-size: 1.15rem;
font-weight: 700;
color: var(–accent);
}

.logo-icon {
width: 36px; height: 36px;
background: linear-gradient(135deg, var(–accent), var(–accent2));
border-radius: 8px;
display: grid;
place-items: center;
font-size: 18px;
}

.header-actions {
display: flex;
align-items: center;
gap: 10px;
}

/* ─── Buttons ─── */
.btn {
display: inline-flex;
align-items: center;
gap: 7px;
padding: 8px 16px;
border-radius: 7px;
border: none;
font-family: inherit;
font-size: 0.85rem;
font-weight: 600;
cursor: pointer;
transition: all .18s;
}

.btn-primary {
background: var(–accent);
color: #000;
}
.btn-primary:hover { background: #ffc333; transform: translateY(-1px); }

.btn-outline {
background: transparent;
border: 1px solid var(–border);
color: var(–text);
}
.btn-outline:hover { background: var(–surface2); border-color: var(–accent); }

.btn-danger {
background: transparent;
border: 1px solid var(–red);
color: var(–red);
}
.btn-danger:hover { background: rgba(248,81,73,.15); }

.btn-green {
background: var(–green);
color: #000;
}
.btn-green:hover { filter: brightness(1.15); }

/* ─── Main layout ─── */
main { padding: 32px; max-width: 1400px; margin: 0 auto; }

/* ─── Stats ─── */
.stats {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
gap: 16px;
margin-bottom: 28px;
}

.stat-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 18px 20px;
transition: border-color .2s;
}

.stat-card:hover { border-color: var(–accent); }

.stat-label {
font-size: .75rem;
color: var(–text-muted);
text-transform: uppercase;
letter-spacing: .04em;
margin-bottom: 8px;
}

.stat-value {
font-size: 1.8rem;
font-weight: 700;
color: var(–accent);
}

/* ─── Toolbar ─── */
.toolbar {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 20px;
flex-wrap: wrap;
}

.search-wrap {
position: relative;
flex: 1;
min-width: 200px;
}

.search-wrap svg {
position: absolute;
right: 12px;
top: 50%;
transform: translateY(-50%);
color: var(–text-muted);
pointer-events: none;
}

.search-input {
width: 100%;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
padding: 9px 38px 9px 14px;
color: var(–text);
font-family: inherit;
font-size: .9rem;
outline: none;
transition: border-color .2s;
}
.search-input:focus { border-color: var(–accent); }
.search-input::placeholder { color: var(–text-muted); }

.filter-select {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
padding: 9px 14px;
color: var(–text);
font-family: inherit;
font-size: .9rem;
outline: none;
cursor: pointer;
transition: border-color .2s;
}
.filter-select:focus { border-color: var(–accent); }
.filter-select option { background: var(–surface2); }

/* ─── Table ─── */
.table-wrap {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
overflow: hidden;
}

table {
width: 100%;
border-collapse: collapse;
font-size: .88rem;
}

thead tr {
background: var(–surface2);
border-bottom: 1px solid var(–border);
}

th {
padding: 12px 16px;
text-align: right;
font-weight: 600;
color: var(–text-muted);
font-size: .78rem;
text-transform: uppercase;
letter-spacing: .04em;
white-space: nowrap;
cursor: pointer;
user-select: none;
}
th:hover { color: var(–accent); }

td {
padding: 13px 16px;
border-bottom: 1px solid var(–border);
vertical-align: middle;
}

tbody tr:last-child td { border-bottom: none; }

tbody tr {
transition: background .15s;
}
tbody tr:hover { background: rgba(240,165,0,.05); }

.badge {
display: inline-block;
padding: 3px 10px;
border-radius: 20px;
font-size: .76rem;
font-weight: 600;
}

.badge-active { background: rgba(63,185,80,.15); color: var(–green); }
.badge-inactive { background: rgba(248,81,73,.15); color: var(–red); }

.actions-cell { display: flex; gap: 6px; justify-content: flex-end; }

.icon-btn {
width: 30px; height: 30px;
border-radius: 6px;
border: 1px solid var(–border);
background: transparent;
color: var(–text-muted);
cursor: pointer;
display: grid;
place-items: center;
transition: all .15s;
}
.icon-btn:hover { border-color: var(–accent); color: var(–accent); background: rgba(240,165,0,.08); }
.icon-btn.del:hover { border-color: var(–red); color: var(–red); background: rgba(248,81,73,.08); }

/* ─── Empty state ─── */
.empty-state {
text-align: center;
padding: 60px 20px;
color: var(–text-muted);
}

.empty-state .icon { font-size: 3rem; margin-bottom: 14px; }
.empty-state p { font-size: 1rem; }

/* ─── Pagination ─── */
.pagination {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 20px;
border-top: 1px solid var(–border);
font-size: .85rem;
color: var(–text-muted);
}

.page-btns { display: flex; gap: 6px; }

.page-btn {
width: 32px; height: 32px;
border-radius: 6px;
border: 1px solid var(–border);
background: transparent;
color: var(–text);
cursor: pointer;
font-family: inherit;
font-size: .85rem;
display: grid;
place-items: center;
transition: all .15s;
}
.page-btn:hover { border-color: var(–accent); color: var(–accent); }
.page-btn.active { background: var(–accent); color: #000; border-color: var(–accent); }
.page-btn:disabled { opacity: .35; pointer-events: none; }

/* ─── Modal ─── */
.overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,.65);
z-index: 200;
place-items: center;
}
.overlay.open { display: grid; }

.modal {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
width: 560px;
max-width: 95vw;
max-height: 90vh;
overflow-y: auto;
animation: slideUp .25s ease;
}

@keyframes slideUp {
from { opacity: 0; transform: translateY(30px); }
to   { opacity: 1; transform: translateY(0); }
}

.modal-header {
padding: 20px 24px;
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
}

.modal-title { font-size: 1.05rem; font-weight: 700; }

.modal-close {
background: none;
border: none;
color: var(–text-muted);
cursor: pointer;
font-size: 1.4rem;
line-height: 1;
padding: 2px 6px;
border-radius: 4px;
transition: color .15s;
}
.modal-close:hover { color: var(–text); }

.modal-body { padding: 24px; }

.form-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 16px;
}

.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: span 2; }

.form-label {
font-size: .8rem;
font-weight: 600;
color: var(–text-muted);
text-transform: uppercase;
letter-spacing: .04em;
}

.form-input, .form-select {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 7px;
padding: 9px 12px;
color: var(–text);
font-family: inherit;
font-size: .9rem;
outline: none;
transition: border-color .2s;
}
.form-input:focus, .form-select:focus { border-color: var(–accent); }
.form-select option { background: var(–surface2); }

.modal-footer {
padding: 16px 24px;
border-top: 1px solid var(–border);
display: flex;
gap: 10px;
justify-content: flex-end;
}

/* ─── Toast ─── */
.toast {
position: fixed;
bottom: 28px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: var(–surface2);
border: 1px solid var(–border);
padding: 12px 22px;
border-radius: 30px;
font-size: .88rem;
display: flex;
align-items: center;
gap: 8px;
z-index: 999;
transition: transform .3s cubic-bezier(.34,1.56,.64,1);
white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(–green); color: var(–green); }
.toast.error   { border-color: var(–red);   color: var(–red);   }

/* ─── Upload zone ─── */
.upload-zone {
border: 2px dashed var(–border);
border-radius: 12px;
padding: 40px;
text-align: center;
cursor: pointer;
transition: all .2s;
margin-bottom: 24px;
}
.upload-zone:hover, .upload-zone.drag-over {
border-color: var(–accent);
background: rgba(240,165,0,.04);
}
.upload-zone .upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
.upload-zone p { color: var(–text-muted); font-size: .9rem; }
.upload-zone strong { color: var(–accent); }

#fileInput { display: none; }

.count-badge {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 20px;
padding: 2px 10px;
font-size: .75rem;
color: var(–text-muted);
margin-right: 6px;
}
</style>

</head>
<body>

<!-- Header -->

<header>
  <div class="logo">
    <div class="logo-icon">👥</div>
    نظام إدارة الموظفين
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="exportExcel()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      تصدير Excel
    </button>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      إضافة موظف
    </button>
  </div>
</header>

<main>

  <!-- Upload Zone -->

  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()"
       ondragover="event.preventDefault();this.classList.add('drag-over')"
       ondragleave="this.classList.remove('drag-over')"
       ondrop="handleDrop(event)">
    <div class="upload-icon">📊</div>
    <p><strong>اسحب ملف Excel هنا</strong> أو انقر للاختيار</p>
    <p style="margin-top:6px;font-size:.8rem">يدعم ملفات .xlsx و .xls</p>
  </div>
  <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(this.files[0])">

  <!-- Stats -->

  <div class="stats" id="statsRow">
    <div class="stat-card"><div class="stat-label">إجمالي الموظفين</div><div class="stat-value" id="statTotal">0</div></div>
    <div class="stat-card"><div class="stat-label">نشط</div><div class="stat-value" id="statActive" style="color:var(--green)">0</div></div>
    <div class="stat-card"><div class="stat-label">غير نشط</div><div class="stat-value" id="statInactive" style="color:var(--red)">0</div></div>
    <div class="stat-card"><div class="stat-label">الأقسام</div><div class="stat-value" id="statDepts">0</div></div>
  </div>

  <!-- Toolbar -->

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="بحث بالاسم أو الرقم الوظيفي..." oninput="render()">
    </div>
    <select class="filter-select" id="deptFilter" onchange="render()">
      <option value="">كل الأقسام</option>
    </select>
    <select class="filter-select" id="statusFilter" onchange="render()">
      <option value="">كل الحالات</option>
      <option value="نشط">نشط</option>
      <option value="غير نشط">غير نشط</option>
    </select>
  </div>

  <!-- Table -->

  <div class="table-wrap">
    <table>
      <thead>
        <tr id="tableHead"></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="icon">🔍</div>
      <p>لا توجد نتائج مطابقة</p>
    </div>
    <div class="pagination">
      <span id="pageInfo" style="font-size:.85rem"></span>
      <div class="page-btns" id="pageBtns"></div>
    </div>
  </div>

</main>

<!-- Modal -->

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">إضافة موظف جديد</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid" id="formGrid"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" onclick="saveEmployee()">حفظ</button>
    </div>
  </div>
</div>

<!-- Toast -->

<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────
let employees = [];
let columns   = [];
let editIndex = null;
let page      = 1;
const PER_PAGE = 10;

// ─── Default columns when no file uploaded ───────────────
const DEFAULT_COLS = ['رقم الموظف','الاسم','القسم','المسمى الوظيفي','الراتب','تاريخ التعيين','الحالة'];

// ─── Sample data ─────────────────────────────────────────
const SAMPLE = [
  {' رقم الموظف':'EMP001','الاسم':'أحمد محمد الزهراني','القسم':'تقنية المعلومات','المسمى الوظيفي':'مطور برمجيات','الراتب':'12000','تاريخ التعيين':'2021-03-15','الحالة':'نشط'},
  {' رقم الموظف':'EMP002','الاسم':'سارة علي الغامدي','القسم':'الموارد البشرية','المسمى الوظيفي':'مدير موارد بشرية','الراتب':'15000','تاريخ التعيين':'2019-07-01','الحالة':'نشط'},
  {' رقم الموظف':'EMP003','الاسم':'خالد عبدالله القحطاني','القسم':'المالية','المسمى الوظيفي':'محاسب','الراتب':'10000','تاريخ التعيين':'2020-11-20','الحالة':'نشط'},
  {' رقم الموظف':'EMP004','الاسم':'نورة سعد العتيبي','القسم':'التسويق','المسمى الوظيفي':'مديرة تسويق','الراتب':'14000','تاريخ التعيين':'2018-02-10','الحالة':'نشط'},
  {' رقم الموظف':'EMP005','الاسم':'محمد فهد الدوسري','القسم':'تقنية المعلومات','المسمى الوظيفي':'مهندس شبكات','الراتب':'11000','تاريخ التعيين':'2022-05-08','الحالة':'غير نشط'},
  {' رقم الموظف':'EMP006','الاسم':'فاطمة حسن الشمري','القسم':'العمليات','المسمى الوظيفي':'مشرفة عمليات','الراتب':'9500','تاريخ التعيين':'2021-09-14','الحالة':'نشط'},
  {' رقم الموظف':'EMP007','الاسم':'عبدالرحمن يوسف المالكي','القسم':'المبيعات','المسمى الوظيفي':'مندوب مبيعات','الراتب':'8000','تاريخ التعيين':'2023-01-03','الحالة':'نشط'},
  {' رقم الموظف':'EMP008','الاسم':'ريم تركي الحربي','القسم':'المالية','المسمى الوظيفي':'مدققة حسابات','الراتب':'13000','تاريخ التعيين':'2017-06-22','الحالة':'غير نشط'},
];

// ─── Init ─────────────────────────────────────────────────
function init() {
  employees = SAMPLE.map(r => ({...r}));
  columns   = Object.keys(employees[0]).map(c => c.trim());
  // normalize keys
  employees = employees.map(r => {
    const obj = {};
    Object.keys(r).forEach(k => obj[k.trim()] = r[k]);
    return obj;
  });
  updateStats();
  updateFilters();
  buildHead();
  render();
}

// ─── File handling ────────────────────────────────────────
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, {defval:''});
      if (!data.length) { toast('الملف فارغ','error'); return; }
      columns   = Object.keys(data[0]).map(c => String(c).trim());
      employees = data.map(r => {
        const obj = {};
        Object.keys(r).forEach(k => obj[String(k).trim()] = String(r[k]));
        return obj;
      });
      // hide upload zone
      document.getElementById('uploadZone').style.display = 'none';
      updateStats();
      updateFilters();
      buildHead();
      render();
      toast(`✅ تم تحميل ${employees.length} موظف من الملف`,'success');
    } catch(err) {
      toast('خطأ في قراءة الملف','error');
    }
  };
  reader.readAsBinaryString(file);
}

// ─── Stats ────────────────────────────────────────────────
function updateStats() {
  document.getElementById('statTotal').textContent = employees.length;
  const statusCol = columns.find(c => c.includes('حال') || c.includes('stat')) || '';
  const active   = employees.filter(e => String(e[statusCol]||'').includes('نشط') && !String(e[statusCol]||'').includes('غير')).length;
  document.getElementById('statActive').textContent = statusCol ? active : '—';
  document.getElementById('statInactive').textContent = statusCol ? employees.length - active : '—';
  const deptCol = columns.find(c => c.includes('قسم') || c.includes('dept')) || '';
  const depts = deptCol ? new Set(employees.map(e => e[deptCol])).size : '—';
  document.getElementById('statDepts').textContent = depts;
}

// ─── Filters ──────────────────────────────────────────────
function updateFilters() {
  const deptCol = columns.find(c => c.includes('قسم') || c.includes('dept')) || '';
  const sel = document.getElementById('deptFilter');
  sel.innerHTML = '<option value="">كل الأقسام</option>';
  if (deptCol) {
    [...new Set(employees.map(e => e[deptCol]))].filter(Boolean).sort().forEach(d => {
      sel.innerHTML += `<option value="${d}">${d}</option>`;
    });
  }
}

// ─── Table head ───────────────────────────────────────────
function buildHead() {
  const tr = document.getElementById('tableHead');
  tr.innerHTML = columns.map(c => `<th>${c}</th>`).join('') + '<th style="text-align:left">إجراءات</th>';
}

// ─── Render ───────────────────────────────────────────────
function filtered() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const dept   = document.getElementById('deptFilter').value;
  const status = document.getElementById('statusFilter').value;
  const deptCol   = columns.find(c => c.includes('قسم') || c.includes('dept')) || '';
  const statusCol = columns.find(c => c.includes('حال') || c.includes('stat')) || '';

  return employees.filter(e => {
    const matchQ = !q || Object.values(e).some(v => String(v).toLowerCase().includes(q));
    const matchD = !dept   || e[deptCol]   === dept;
    const matchS = !status || e[statusCol] === status;
    return matchQ && matchD && matchS;
  });
}

function render() {
  const data = filtered();
  const totalPages = Math.max(1, Math.ceil(data.length / PER_PAGE));
  if (page > totalPages) page = totalPages;

  const slice = data.slice((page-1)*PER_PAGE, page*PER_PAGE);
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  const statusCol = columns.find(c => c.includes('حال') || c.includes('stat')) || '';

  if (!slice.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = slice.map((emp, i) => {
      const realIndex = employees.indexOf(emp);
      const cells = columns.map(c => {
        const v = emp[c] ?? '';
        if (c === statusCol) {
          const active = String(v).includes('نشط') && !String(v).includes('غير');
          return `<td><span class="badge ${active?'badge-active':'badge-inactive'}">${v||'—'}</span></td>`;
        }
        return `<td>${v||'—'}</td>`;
      }).join('');
      return `<tr>
        ${cells}
        <td>
          <div class="actions-cell">
            <button class="icon-btn" title="تعديل" onclick="editEmployee(${realIndex})">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="icon-btn del" title="حذف" onclick="deleteEmployee(${realIndex})">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  // Pagination info
  document.getElementById('pageInfo').textContent =
    `عرض ${Math.min((page-1)*PER_PAGE+1, data.length)}–${Math.min(page*PER_PAGE, data.length)} من ${data.length}`;

  // Page buttons
  const pb = document.getElementById('pageBtns');
  pb.innerHTML = '';
  const prevBtn = btn('‹', page===1, () => { page--; render(); });
  pb.appendChild(prevBtn);
  for (let i=1; i<=totalPages; i++) {
    const b = btn(i, false, () => { page=i; render(); });
    if (i===page) b.classList.add('active');
    pb.appendChild(b);
  }
  const nextBtn = btn('›', page===totalPages, () => { page++; render(); });
  pb.appendChild(nextBtn);

  updateStats();
}

function btn(label, disabled, fn) {
  const b = document.createElement('button');
  b.className = 'page-btn';
  b.textContent = label;
  b.disabled = disabled;
  b.onclick = fn;
  return b;
}

// ─── Modal ────────────────────────────────────────────────
function openModal(emp, idx) {
  editIndex = idx !== undefined ? idx : null;
  document.getElementById('modalTitle').textContent = emp ? 'تعديل بيانات الموظف' : 'إضافة موظف جديد';

  const grid = document.getElementById('formGrid');
  grid.innerHTML = columns.map(c => {
    const val = emp ? (emp[c]||'') : '';
    if (c.includes('حال') || c.includes('stat')) {
      return `<div class="form-group">
        <label class="form-label">${c}</label>
        <select class="form-select" data-col="${c}">
          <option ${val==='نشط'?'selected':''}>نشط</option>
          <option ${val==='غير نشط'?'selected':''}>غير نشط</option>
        </select>
      </div>`;
    }
    return `<div class="form-group">
      <label class="form-label">${c}</label>
      <input class="form-input" type="text" data-col="${c}" value="${val}" placeholder="${c}">
    </div>`;
  }).join('');

  document.getElementById('overlay').classList.add('open');
}

function editEmployee(idx) { openModal(employees[idx], idx); }

function closeModal() { document.getElementById('overlay').classList.remove('open'); editIndex=null; }

function saveEmployee() {
  const inputs = document.querySelectorAll('#formGrid [data-col]');
  const obj = {};
  inputs.forEach(el => obj[el.dataset.col] = el.value.trim());

  if (editIndex !== null) {
    employees[editIndex] = obj;
    toast('✅ تم تحديث بيانات الموظف','success');
  } else {
    employees.unshift(obj);
    toast('✅ تمت إضافة الموظف بنجاح','success');
  }
  closeModal();
  page = 1;
  updateStats();
  updateFilters();
  render();
}

function deleteEmployee(idx) {
  if (!confirm('هل أنت متأكد من حذف هذا الموظف؟')) return;
  employees.splice(idx,1);
  render();
  toast('🗑️ تم حذف الموظف','error');
}

// ─── Export ───────────────────────────────────────────────
function exportExcel() {
  const ws = XLSX.utils.json_to_sheet(employees);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'الموظفين');
  XLSX.writeFile(wb, 'employees_export.xlsx');
  toast('📥 جاري تحميل الملف...','success');
}

// ─── Toast ────────────────────────────────────────────────
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type}`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── Boot ─────────────────────────────────────────────────
init();
</script>

</body>
</html>
